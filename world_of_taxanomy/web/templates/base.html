<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WorldOfTaxanomy{% endblock %}</title>

  <!-- Fonts: Instrument Serif + Instrument Sans (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">

  <!-- Geist Mono -->
  <link href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts/geist-mono/style.min.css" rel="stylesheet">

  <!-- Observatory CSS -->
  <link rel="stylesheet" href="/static/css/observatory.css">

  {% block head %}{% endblock %}
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">
        <div class="glyph"></div>
        WorldOfTaxanomy
      </a>
      <nav class="site-nav">
        <a href="/" {% if active_nav == 'galaxy' %}class="active"{% endif %}>Galaxy</a>
        <a href="/system/naics_2022" {% if active_nav == 'naics' %}class="active"{% endif %}>NAICS</a>
        <a href="/system/isic_rev4" {% if active_nav == 'isic' %}class="active"{% endif %}>ISIC</a>
        <a href="/docs" target="_blank">API Docs</a>
      </nav>
    </div>
  </header>

  <!-- Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      WorldOfTaxanomy — Unified Global Industry Classification Knowledge Graph
    </div>
  </footer>

  <!-- JS -->
  <script src="/static/js/api-client.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
