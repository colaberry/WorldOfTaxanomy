# Alembic configuration for WorldOfTaxonomy.
#
# Actual DB URL comes from the DATABASE_URL env var (resolved in
# migrations/env.py) so we never check credentials into the repo.
# sqlalchemy.url is left intentionally blank.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
timezone = UTC
sqlalchemy.url =

# File naming: <YYYY-MM-DD_HHMM>_<slug>_<rev>.py
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s_%%(rev)s

[post_write_hooks]
# hooks = ...  (not used yet)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
